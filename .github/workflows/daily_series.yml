name: Daily Series Runner

# Generates one part per day (respects Veo 10 RPD limit).
# Timeline per series:
#   Day 0: Scripts generated, arc-validated, saved to repo
#   Day 1-5: One part generated + uploaded to YouTube (PRIVATE)
#   Day 6: Longform assembled + uploaded (PUBLIC), playlist created
#   Day 7: New series begins
#
# Parts drip-feed to PUBLIC via publish_part.yml at 15:00 UTC.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      theme:
        description: 'Story theme (leave blank for themes.txt rotation)'
        required: false
        default: ''
      ending:
        description: 'Ending type: happy | sad | bittersweet'
        required: false
        default: 'bittersweet'
      dry_run:
        description: 'Skip YouTube upload (test mode)'
        type: boolean
        default: false

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Restore YouTube OAuth token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Restore OAuth client credentials
        run: echo '${{ secrets.OAUTH_CLIENT_JSON }}' > oauth_client.json

      - name: Write .env
        run: |
          cat > .env << 'EOF'
GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
GOOGLE_NL_KEY=${{ secrets.GOOGLE_NL_KEY }}
HF_TOKEN=${{ secrets.HF_TOKEN }}
REPLICATE_API_TOKEN=${{ secrets.REPLICATE_API_TOKEN }}
ElevenLabs_API_Key=${{ secrets.ELEVENLABS_API_KEY }}
VEO_MODEL=veo-3.1-lite-generate-preview
STYLE_PREFIX=${{ secrets.STYLE_PREFIX }}
EOF

      - name: Get next theme
        id: theme
        env:
          PYTHONPATH: .
        run: |
          if [ -n "${{ github.event.inputs.theme }}" ]; then
            echo "theme=${{ github.event.inputs.theme }}" >> $GITHUB_OUTPUT
          else
            THEME=$(python scripts/rotate_theme.py 2>/dev/null || echo "")
            echo "theme=$THEME" >> $GITHUB_OUTPUT
          fi

      - name: Run daily runner
        env:
          PYTHONPATH: .
        run: |
          ARGS="--veo"
          THEME="${{ steps.theme.outputs.theme }}"
          ENDING="${{ github.event.inputs.ending || 'bittersweet' }}"
          [ -n "$THEME" ]   && ARGS="$ARGS --theme \"$THEME\""
          [ -n "$ENDING" ]  && ARGS="$ARGS --ending $ENDING"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          eval python scripts/daily_runner.py $ARGS

      - name: Commit state and queue
        run: |
          git config user.name  "series-bot"
          git config user.email "series-bot@users.noreply.github.com"
          git add state.json queue.json themes.txt
          git add "output/*/series.json" 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: series progress $(date -u +%Y-%m-%d) [skip ci]" && git push)

      - name: Upload output on failure (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-${{ github.run_id }}
          path: output/
          retention-days: 3
