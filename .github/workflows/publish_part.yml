name: Publish Next Part

on:
  # Every day at 15:00 UTC — publishes next queued private Short
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  publish-next:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Restore OAuth client
        run: |
          echo '${{ secrets.OAUTH_CLIENT_JSON }}' > oauth_client.json

      - name: Publish next queued part
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PYTHONPATH: .
        run: python scripts/schedule_publish.py

      - name: Save updated queue.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add queue.json || true
          git diff --staged --quiet || git commit -m "chore: mark part published [skip ci]"
          git push
